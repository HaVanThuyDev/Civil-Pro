apiVersion: apps/v1
kind: Deployment
metadata:
  name: civil-pro-deployment
  labels:
    app: civil-pro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: civil-pro
  template:
    metadata:
      labels:
        app: civil-pro
    spec:
      containers:
      - name: civil-pro-container
        image: havanthuydev/civil-pro:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: civil-pro-service
spec:
  type: NodePort
  selector:
    app: civil-pro
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
