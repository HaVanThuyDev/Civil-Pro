server:
  port: 8083
  servlet:
    context-path: /api

spring:
  application:
    name: civil-pro-ho-khau
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    url: jdbc:mysql://localhost:3306/DB_HO_KHAU?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&rewriteBatchedStatements=true
    username: ${DB_USERNAME:civil}
    password: ${DB_PASSWORD:civilpro123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: HoKhau-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 3
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: civil-pro-ho-khau-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "vn.civil.*"

grpc:
  server:
    port: 9083
  client:
    # Kết nối gRPC tới CongDan Service (resolve qua Eureka)
    cong-dan-service:
      address: discovery:///civil-pro-cong-dan
      negotiation-type: plaintext
    # Kết nối gRPC tới DVHC Service
    dvhc-service:
      address: discovery:///civil-pro-dvhc
      negotiation-type: plaintext

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

civil-pro:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-use-256-bit-key}
  kafka:
    topics:
      ho-khau-created: ho-khau.created
      ho-khau-tach-nhap: ho-khau.tach-nhap

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  level:
    vn.civilpro: DEBUG