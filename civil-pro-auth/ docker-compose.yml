version: '3.9'

# ================================================================
# CIVIL-PRO DOCKER COMPOSE - MÔI TRƯỜNG PHÁT TRIỂN (DEV)
# Bao gồm: Infrastructure + tất cả Microservices
#
# Khởi động infrastructure trước:
#   docker-compose up -d mysql redis kafka zookeeper eureka config-server
#
# Sau đó khởi động services:
#   docker-compose up -d gateway auth-service cong-dan-service ...
#
# Xem logs:
#   docker-compose logs -f cong-dan-service
# ================================================================

# ---- NETWORKS ----
networks:
  civil-pro-net:
    driver: bridge
    name: civil-pro-network

# ---- VOLUMES ----
volumes:
  mysql-data:
  redis-data:
  kafka-data:
  minio-data:
  zipkin-data:

services:

  # ==============================================================
  # INFRASTRUCTURE LAYER
  # ==============================================================

  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: civil-pro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: civil
      MYSQL_PASSWORD: civilpro123
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d  # Tạo các DB khi start
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=256M
    networks:
      - civil-pro-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucivilpro", "-pcivilpro123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: civil-pro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - civil-pro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---- Zookeeper (Kafka cần) ----
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: civil-pro-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - civil-pro-net

  # ---- Kafka ----
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: civil-pro-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168   # 7 ngày
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - civil-pro-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Kafka UI (debug topics dễ hơn) ----
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: civil-pro-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: civil-pro
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - civil-pro-net

  # ---- MinIO (S3-compatible object storage) ----
  minio:
    image: minio/minio:latest
    container_name: civil-pro-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: civil
      MINIO_ROOT_PASSWORD: civilpro123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - civil-pro-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Eureka Service Discovery ----
  eureka:
    image: springcloud/eureka
    container_name: civil-pro-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      - eureka.instance.hostname=eureka
      - eureka.client.registerWithEureka=false
      - eureka.client.fetchRegistry=false
    networks:
      - civil-pro-net

  # ---- Zipkin (Distributed Tracing) ----
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: civil-pro-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    networks:
      - civil-pro-net

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: civil-pro-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - civil-pro-net

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: civil-pro-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - ./monitoring/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - civil-pro-net

  # ==============================================================
  # APPLICATION SERVICES
  # Mỗi service build từ Dockerfile trong thư mục tương ứng
  # ==============================================================

  # ---- API Gateway ----
  gateway:
    build:
      context: ./civil-pro-gateway
      dockerfile: Dockerfile
    container_name: civil-pro-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka:8761/eureka
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-256-bit}
    depends_on:
      - eureka
      - redis
    networks:
      - civil-pro-net

  # ---- Auth Service ----
  auth-service:
    build:
      context: ./civil-pro-auth
      dockerfile: Dockerfile
    container_name: civil-pro-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=civil
      - DB_PASSWORD=civilpro123
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/DB_AUTH?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      - EUREKA_URL=http://eureka:8761/eureka
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-256-bit}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka:
        condition: service_started
    networks:
      - civil-pro-net

  # ---- Công Dân Service ----
  cong-dan-service:
    build:
      context: ./civil-pro-cong-dan
      dockerfile: Dockerfile
    container_name: civil-pro-cong-dan
    restart: unless-stopped
    ports:
      - "8082:8082"
      - "9082:9082"    # gRPC port
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=civil
      - DB_PASSWORD=civilpro123
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/DB_CONG_DAN?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      - EUREKA_URL=http://eureka:8761/eureka
      - REDIS_HOST=redis
      - KAFKA_SERVERS=kafka:29092
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-256-bit}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka:
        condition: service_started
    networks:
      - civil-pro-net

  # ---- Hộ Khẩu Service ----
  ho-khau-service:
    build:
      context: ./civil-pro-ho-khau
      dockerfile: Dockerfile
    container_name: civil-pro-ho-khau
    restart: unless-stopped
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=civil
      - DB_PASSWORD=civilpro123
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/DB_HO_KHAU?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      - EUREKA_URL=http://eureka:8761/eureka
      - REDIS_HOST=redis
      - KAFKA_SERVERS=kafka:29092
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-256-bit}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    networks:
      - civil-pro-net