syntax = "proto3";

package civilpro.auth;

option java_multiple_files = true;
option java_package = "vn.civilpro.auth.grpc.proto";
option java_outer_classname = "AuthProto";

message LoginRequest {
  string login_name = 1;
  string password = 2;
  string client_ip = 3;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string full_name = 4;
  string administrative_code = 5;
  repeated string role_ids = 6;
  string created_by = 7;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string access_token = 1;
  string refresh_token = 2;
  string username = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message UserInfo {
  int64 id = 1;
  string username = 2;
  string full_name = 3;
  string email = 4;
  string phone_number = 5;
  string administrative_code = 6;
  int32 status = 7;
  repeated string role_codes = 8;
  repeated string authorities = 9;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string token_type = 4;
  UserInfo user = 5;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

message UserResponse {
  int32 status = 1;
  string message = 2;
  UserInfo user = 3;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
  repeated string roles = 4;
}

service AuthService {
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Register(RegisterRequest) returns (UserResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}